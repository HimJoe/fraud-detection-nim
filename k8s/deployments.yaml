---
# ═══════════════════════════════════════════════════════════════════════════════
#  MODULE 1 — GENERATOR
#  Runs on CPU nodes (no GPU needed)
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator
  namespace: fraud-detection
  labels:
    app: generator
    module: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generator
  template:
    metadata:
      labels:
        app: generator
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: generator
          image: ${REGISTRY}/fraud-generator:${TAG}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: kaggle-data
              mountPath: /data
              readOnly: true
      volumes:
        - name: kaggle-data
          persistentVolumeClaim:
            claimName: kaggle-data-pvc

---
# ═══════════════════════════════════════════════════════════════════════════════
#  MODULE 2 — DATA PREP
#  Runs on L40S GPU nodes — uses RAPIDS cuDF for GPU-accelerated feature engineering
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-prep
  namespace: fraud-detection
  labels:
    app: data-prep
    module: "2"
spec:
  replicas: 2                      # Scale horizontally for throughput
  selector:
    matchLabels:
      app: data-prep
  template:
    metadata:
      labels:
        app: data-prep
    spec:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: data-prep
          image: ${REGISTRY}/fraud-data-prep:${TAG}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "16Gi"
              nvidia.com/gpu: "1"

---
# ═══════════════════════════════════════════════════════════════════════════════
#  MODULE 3 — INFERENCE
#  Runs on L40S GPU nodes — calls Triton for GNN + XGBoost scoring
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: fraud-detection
  labels:
    app: inference
    module: "3"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: inference
          image: ${REGISTRY}/fraud-inference:${TAG}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: "32Gi"
              nvidia.com/gpu: "1"

---
# ═══════════════════════════════════════════════════════════════════════════════
#  MODULE 4 — DASHBOARD
#  Runs on CPU nodes — FastAPI + React, no GPU needed
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: fraud-detection
  labels:
    app: dashboard
    module: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: ${REGISTRY}/fraud-dashboard:${TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: fraud-detection
spec:
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer

---
# ═══════════════════════════════════════════════════════════════════════════════
#  TRITON INFERENCE SERVER
#  L40S GPU node — serves GNN + XGBoost model ensemble
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton
  namespace: fraud-detection
  labels:
    app: triton
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton
  template:
    metadata:
      labels:
        app: triton
    spec:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:24.12-py3
          args:
            - "tritonserver"
            - "--model-repository=/models"
            - "--log-verbose=1"
            - "--metrics-port=8002"
          ports:
            - containerPort: 8000   # HTTP
            - containerPort: 8001   # gRPC
            - containerPort: 8002   # Metrics
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: "48Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-repo
              mountPath: /models
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 5
      volumes:
        - name: model-repo
          persistentVolumeClaim:
            claimName: model-repo-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: triton
  namespace: fraud-detection
spec:
  selector:
    app: triton
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 8001
      targetPort: 8001
    - name: metrics
      port: 8002
      targetPort: 8002
  type: ClusterIP
