<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fraud Detection NIM — Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0e1a; color: #e5e7eb; font-family: 'Segoe UI', system-ui, sans-serif; }
header { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:#111827; border-bottom:1px solid #1f2937; position:sticky; top:0; z-index:100; }
.nvidia { background:#76b900; color:#000; font-weight:800; padding:3px 8px; border-radius:4px; font-size:12px; }
h1 { font-size:15px; font-weight:600; margin-left:10px; }
.logo { display:flex; align-items:center; }
.status { display:flex; align-items:center; gap:8px; font-size:13px; color:#6b7280; }
.dot { width:8px; height:8px; border-radius:50%; background:#76b900; }
.dot.off { background:#ef4444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.dot.live { animation:pulse 2s infinite; }
main { padding:20px 24px; max-width:1400px; margin:0 auto; display:grid; gap:16px; }
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; }
.kpi { background:#111827; border:1px solid #1f2937; border-radius:10px; padding:18px 20px; }
.kpi.green { border-color:#76b900; }
.kpi.red { border-color:#ef4444; }
.kpi label { font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px; }
.kpi .val { font-size:26px; font-weight:700; }
.kpi .sub { font-size:12px; color:#6b7280; margin-top:4px; }
.g{color:#76b900} .r{color:#ef4444} .b{color:#00c6ff}
.biz { background:linear-gradient(135deg,rgba(118,185,0,0.08),rgba(0,198,255,0.05)); border:1px solid #76b900; border-radius:10px; padding:20px 24px; }
.biz h3 { color:#76b900; font-size:14px; font-weight:700; margin-bottom:14px; }
.biz-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
.biz-stat label { font-size:11px; color:#6b7280; text-transform:uppercase; display:block; }
.biz-stat .v { font-size:22px; font-weight:700; color:#76b900; }
.charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.card { background:#111827; border:1px solid #1f2937; border-radius:10px; padding:18px 20px; }
.card h3 { font-size:12px; color:#6b7280; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; }
.pipelines { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.pipe { background:#111827; border:1px solid #1f2937; border-radius:10px; padding:16px 18px; }
.pipe h4 { font-size:12px; font-weight:700; color:#6b7280; text-transform:uppercase; margin-bottom:12px; }
.badge { display:inline-block; padding:2px 6px; border-radius:3px; font-size:11px; font-weight:700; margin-left:6px; }
.bg{background:rgba(118,185,0,0.2);color:#76b900} .bc{background:rgba(0,198,255,0.2);color:#00c6ff}
.mrow { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #1f2937; font-size:13px; }
.mrow:last-child{border:none} .mrow .lbl{color:#6b7280} .mrow .mv{font-weight:600}
.fb-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
.fb-stream { background:#0d1424; border:1px solid #1f2937; border-radius:8px; padding:12px; }
.sname{font-size:10px;color:#76b900;font-family:monospace;font-weight:700;margin-bottom:6px}
.slen{font-size:20px;font-weight:700} .ssub{font-size:11px;color:#6b7280;margin-top:2px}
.bar{height:5px;border-radius:3px;background:#1f2937;margin-top:6px;overflow:hidden}
.fill{height:100%;border-radius:3px;transition:width 0.5s}
.stress-section{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.btn{padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none}
.btn-on{background:#ff3b3b;color:white;box-shadow:0 0 20px rgba(255,59,59,0.4)}
.btn-off{background:#76b900;color:#000;box-shadow:0 0 20px rgba(118,185,0,0.4)}
.stress-info{font-size:13px;color:#6b7280;max-width:400px}
.banner{background:rgba(255,59,59,0.1);border:1px solid #ff3b3b;border-radius:8px;padding:10px 16px;font-size:13px;color:#ff3b3b;font-weight:600;display:none}
.banner.show{display:block}
.legend{display:flex;gap:16px;margin-top:8px;font-size:11px;color:#6b7280}
.connecting{display:flex;align-items:center;justify-content:center;height:60vh;font-size:18px;color:#6b7280}
</style>
</head>
<body>
<header>
  <div class="logo">
    <span class="nvidia">NVIDIA</span>
    <h1>Financial Fraud Detection NIM — Live Dashboard</h1>
  </div>
  <div class="status">
    <div class="dot off" id="dot"></div>
    <span id="conn-txt">Connecting...</span>
    <span id="stress-hdr" style="color:#ff3b3b;font-weight:700;display:none">⚡ STRESS ACTIVE</span>
  </div>
</header>
<main id="app"><div class="connecting">⏳ Connecting to Feature Bus...</div></main>

<script>
const $ = id => document.getElementById(id);
const fmt$ = n => '$' + Number(n).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtN = n => Number(n).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtMs = n => Number(n) < 1 ? '<1ms' : Number(n).toFixed(1)+'ms';

// Simple sparkline using canvas
function Sparkline(canvasId, colors) {
  this.canvas = $(canvasId);
  this.ctx = this.canvas.getContext('2d');
  this.colors = colors;
  this.series = colors.map(() => []);
  this.max = 60;
  this.push = function(vals) {
    vals.forEach((v,i) => {
      this.series[i].push(v);
      if (this.series[i].length > this.max) this.series[i].shift();
    });
    this.draw();
  };
  this.draw = function() {
    const c = this.ctx, w = this.canvas.width, h = this.canvas.height;
    c.clearRect(0,0,w,h);
    const allVals = this.series.flat();
    const peak = Math.max(...allVals, 1);
    // grid
    c.strokeStyle = '#1f2937'; c.lineWidth = 1;
    [0.25,0.5,0.75].forEach(f => { c.beginPath(); c.moveTo(0,h*f); c.lineTo(w,h*f); c.stroke(); });
    this.series.forEach((data, si) => {
      if (data.length < 2) return;
      c.beginPath(); c.strokeStyle = this.colors[si]; c.lineWidth = 2;
      data.forEach((v,i) => {
        const x = (i/(this.max-1))*w, y = h - (v/peak)*(h-4) - 2;
        i===0 ? c.moveTo(x,y) : c.lineTo(x,y);
      });
      c.stroke();
    });
  };
}

let spkTps, spkLat, uiBuilt = false;

function buildUI() {
  $('app').innerHTML = `
    <div class="kpi-row">
      <div class="kpi green"><label>💰 Est. $ Saved</label><div class="val g" id="k-saved">$0</div><div class="sub" id="k-fc">0 fraud txns caught</div></div>
      <div class="kpi"><label>Total Transactions</label><div class="val" id="k-total">0</div><div class="sub" id="k-gtps">Gen TPS: 0</div></div>
      <div class="kpi red"><label>Fraud Value Blocked</label><div class="val r" id="k-fval">$0</div><div class="sub">Total flagged value</div></div>
      <div class="kpi"><label>CPU Inference TPS</label><div class="val b" id="k-ctps">0</div><div class="sub" id="k-clat">Latency: —</div></div>
      <div class="kpi"><label>GPU Inference TPS</label><div class="val g" id="k-gtps2">0</div><div class="sub" id="k-glat">Latency: —</div></div>
      <div class="kpi"><label>Feature Bus Depth</label><div class="val" id="k-fb">0</div><div class="sub">msgs queued</div></div>
    </div>
    <div class="biz">
      <h3>📊 Business Impact — Financial Services ROI</h3>
      <div class="biz-grid">
        <div class="biz-stat"><label>Fraud Blocked</label><div class="v" id="b-saved">$0</div></div>
        <div class="biz-stat"><label>Fraud Caught</label><div class="v" id="b-cnt">0</div></div>
        <div class="biz-stat"><label>Avg Latency</label><div class="v" id="b-lat">—</div></div>
        <div class="biz-stat"><label>Uptime</label><div class="v" id="b-up">0m 0s</div></div>
      </div>
    </div>
    <div class="charts">
      <div class="card">
        <h3>Throughput TPS — 60s</h3>
        <canvas id="c-tps" height="110"></canvas>
        <div class="legend"><span style="color:#f59e0b">■ Generator</span><span style="color:#76b900">■ GPU</span><span style="color:#00c6ff">■ CPU</span></div>
      </div>
      <div class="card">
        <h3>Latency ms — 60s</h3>
        <canvas id="c-lat" height="110"></canvas>
        <div class="legend"><span style="color:#76b900">■ GPU</span><span style="color:#00c6ff">■ CPU</span></div>
      </div>
    </div>
    <div class="pipelines">
      <div class="pipe"><h4>GPU Pipeline <span class="badge bg">L40S</span></h4>
        <div class="mrow"><span class="lbl">TPS</span><span class="mv" id="p-gtps">0</span></div>
        <div class="mrow"><span class="lbl">Latency</span><span class="mv" id="p-glat">—</span></div>
        <div class="mrow"><span class="lbl">Fraud Blocked</span><span class="mv" id="p-gfr">$0</span></div>
        <div class="mrow"><span class="lbl">Stream Depth</span><span class="mv" id="p-gfb">0</span></div>
      </div>
      <div class="pipe"><h4>CPU Pipeline <span class="badge bc">x86</span></h4>
        <div class="mrow"><span class="lbl">Data Prep TPS</span><span class="mv" id="p-dptps">0</span></div>
        <div class="mrow"><span class="lbl">Prep Latency</span><span class="mv" id="p-dplat">—</span></div>
        <div class="mrow"><span class="lbl">Inference TPS</span><span class="mv" id="p-ctps">0</span></div>
        <div class="mrow"><span class="lbl">Inference Latency</span><span class="mv" id="p-clat">—</span></div>
      </div>
    </div>
    <div class="card">
      <h3>Feature Bus — Stream Utilisation</h3>
      <div class="fb-grid" id="fb-grid"></div>
    </div>
    <div class="card">
      <h3>⚡ Stress Test</h3>
      <div class="stress-section">
        <button class="btn btn-on" id="s-btn" onclick="toggleStress()">⚡ ENABLE STRESS TEST</button>
        <div class="banner" id="s-banner">🔴 STRESS MODE ACTIVE — TX rate at maximum</div>
        <div class="stress-info"><strong>Stress test</strong> bumps TX rate to maximum via Redis pub/sub. Watch latency stay stable while TPS spikes on L40S.</div>
      </div>
    </div>`;

  // Init charts after DOM ready
  setTimeout(() => {
    const tc = $('c-tps'), lc = $('c-lat');
    tc.width = tc.parentElement.clientWidth - 36;
    lc.width = lc.parentElement.clientWidth - 36;
    spkTps = new Sparkline('c-tps', ['#f59e0b','#76b900','#00c6ff']);
    spkLat = new Sparkline('c-lat', ['#76b900','#00c6ff']);
  }, 50);
}

function update(d) {
  const fb = d.fb_stream_lengths || {};
  const fbTotal = Object.values(fb).reduce((a,b)=>a+b,0);

  $('k-saved').textContent = fmt$(d.dollars_saved);
  $('k-fc').textContent    = fmtN(d.total_fraud_count)+' fraud txns caught';
  $('k-total').textContent = fmtN(d.total_tx);
  $('k-gtps').textContent  = 'Gen TPS: '+d.generator_tps.toFixed(0);
  $('k-fval').textContent  = fmt$(d.total_fraud_value);
  $('k-ctps').textContent  = d.cpu_tps.toFixed(0);
  $('k-clat').textContent  = 'Latency: '+fmtMs(d.cpu_latency_ms);
  $('k-gtps2').textContent = d.gpu_tps.toFixed(0);
  $('k-glat').textContent  = 'Latency: '+fmtMs(d.gpu_latency_ms);
  $('k-fb').textContent    = fmtN(fbTotal);

  $('b-saved').textContent = fmt$(d.dollars_saved);
  $('b-cnt').textContent   = fmtN(d.total_fraud_count);
  $('b-lat').textContent   = fmtMs((d.cpu_latency_ms+d.gpu_latency_ms)/2);
  const up = d.uptime_seconds||0;
  $('b-up').textContent    = Math.floor(up/60)+'m '+(up%60).toFixed(0)+'s';

  $('p-gtps').textContent  = d.gpu_tps.toFixed(1);
  $('p-glat').textContent  = fmtMs(d.gpu_latency_ms);
  $('p-gfr').textContent   = fmt$(d.total_fraud_value*0.5);
  $('p-gfb').textContent   = fmtN(fb.gpu_tx||0)+' / '+fmtN(fb.gpu_scores||0);
  $('p-dptps').textContent = d.dataprep_tps.toFixed(1);
  $('p-dplat').textContent = fmtMs(d.dataprep_latency_ms);
  $('p-ctps').textContent  = d.cpu_tps.toFixed(1);
  $('p-clat').textContent  = fmtMs(d.cpu_latency_ms);

  const grid = $('fb-grid');
  if (grid) grid.innerHTML = Object.entries(fb).map(([n,v]) =>
    `<div class="fb-stream"><div class="sname">${n}</div><div class="slen">${fmtN(v)}</div>
     <div class="ssub">msgs queued</div>
     <div class="bar"><div class="fill" style="width:${Math.min(100,v/100)}%;background:${v>5000?'#f59e0b':'#76b900'}"></div></div></div>`
  ).join('');

  if (spkTps) spkTps.push([d.generator_tps, d.gpu_tps, d.cpu_tps]);
  if (spkLat) spkLat.push([d.gpu_latency_ms, d.cpu_latency_ms]);

  const on = d.stress_mode;
  $('s-btn').className   = 'btn '+(on?'btn-off':'btn-on');
  $('s-btn').textContent = on?'🟢 DISABLE STRESS TEST':'⚡ ENABLE STRESS TEST';
  $('s-banner').className = 'banner'+(on?' show':'');
  $('stress-hdr').style.display = on?'inline':'none';
}

let stressOn = false;
async function toggleStress() {
  stressOn = !stressOn;
  await fetch('/api/stress/'+(stressOn?'enable':'disable'),{method:'POST'});
}

function connect() {
  const ws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws/metrics');
  ws.onopen = () => {
    $('dot').className = 'dot live';
    $('conn-txt').textContent = 'Live';
    if (!uiBuilt) { buildUI(); uiBuilt = true; }
  };
  ws.onmessage = e => { try { update(JSON.parse(e.data)); } catch(err){} };
  ws.onclose = () => {
    $('dot').className = 'dot off';
    $('conn-txt').textContent = 'Reconnecting...';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}
connect();
</script>
</body>
</html>
